name: FrameworkBase CI

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: frameworkbase-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
  UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
  UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

jobs:
  reproducibility:
    name: 干净副本可复现性预检
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 完整工作副本
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 校验关键工程输入均已纳入版本控制
        shell: pwsh
        run: ./Tools/ci/check-reproducibility.ps1

  asmdef-gate:
    name: asmdef 依赖门禁（分层/热更拓扑）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 静态校验 asmdef 依赖方向（无需 Unity）
        shell: pwsh
        run: ./Tools/ci/check-asmdef-deps.ps1

  tests:
    name: 编译与 EditMode/PlayMode 测试
    needs: [reproducibility, asmdef-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: test-library-${{ runner.os }}-${{ hashFiles('ProjectSettings/ProjectVersion.txt', 'Packages/manifest.json', 'Packages/packages-lock.json') }}
          restore-keys: |
            test-library-${{ runner.os }}-

      - name: 运行全部 Unity 测试
        uses: game-ci/unity-test-runner@v4
        with:
          testMode: all
          checkName: FrameworkBase Test Results
          artifactsPath: artifacts/test-results

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-results
          path: artifacts/test-results
          if-no-files-found: error

  asset-gate:
    name: 资源与工程质量门禁
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 执行 required 资源门禁
        uses: game-ci/unity-builder@v4
        with:
          targetPlatform: StandaloneLinux64
          buildMethod: Framework.Editor.CiGate.RunAssetGateForBuilder
          allowDirtyBuild: false
          customParameters: -strictFonts

  android-player:
    name: Android Player/IL2CPP 构建验证
    needs: asset-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 冷环境 IL2CPP 出包前必须先安装 HybridCLR 本地 il2cpp 并生成构建期依赖，
      # 否则 CheckSettings 预处理器会以“未初始化 HybridCLR”中断出包。
      # 产物落在工程根 HybridCLRData/（gitignore，不入库），随同 job workspace 保留给下一步。
      - name: 安装 HybridCLR 本地 il2cpp 并生成（Android）
        uses: game-ci/unity-builder@v4
        with:
          targetPlatform: Android
          allowDirtyBuild: true
          buildMethod: Framework.Editor.HybridCLRBuildSetup.InstallAndGenerateForBuilder

      - name: 构建 Android Player
        uses: game-ci/unity-builder@v4
        with:
          targetPlatform: Android
          androidExportType: androidPackage
          allowDirtyBuild: true

      - name: 上传 Android 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: android-player
          path: build/Android
          if-no-files-found: error

      # 包体回归门禁：基线（Tools/ci/build-size-baseline.json）已提交时强制执行；
      # 门禁本身失败关闭（缺基线即失败），此处仅在仓库尚未生成基线的引导期跳过并高亮提示。
      # 基线生成：Editor 菜单「Framework/发布/更新包体基线」或 batchmode 传 -buildSizeUpdateBaseline，
      # 生成后必须随代码评审一起提交，禁止 CI 隐式落盘。
      - name: 包体回归门禁（BuildSizeGate，required）
        if: hashFiles('Tools/ci/build-size-baseline.json') != ''
        uses: game-ci/unity-builder@v4
        with:
          targetPlatform: Android
          allowDirtyBuild: true
          buildMethod: Framework.Editor.BuildSize.BuildSizeCiGate.RunBuildSizeGateForBuilder
          customParameters: -buildSizeDir build/Android -buildSizeLabel ${{ github.sha }}

      - name: 包体基线缺失提示
        if: hashFiles('Tools/ci/build-size-baseline.json') == ''
        run: |
          echo "::warning title=BuildSizeGate 未武装::Tools/ci/build-size-baseline.json 不存在，包体回归门禁被跳过。请从本次 android-player 产物生成基线并提交入库。"
          echo "### ⚠️ 包体门禁未武装" >> "$GITHUB_STEP_SUMMARY"
          echo "缺少 Tools/ci/build-size-baseline.json，本次未执行包体回归比对。生成方式见 Tools/ci/README.md。" >> "$GITHUB_STEP_SUMMARY"

  ios-xcode-project:
    name: iOS Xcode 工程生成验证
    needs: android-player
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 同 Android：iOS 出包同样走 IL2CPP，须先安装 HybridCLR 本地 il2cpp 并生成构建期依赖。
      - name: 安装 HybridCLR 本地 il2cpp 并生成（iOS）
        uses: game-ci/unity-builder@v4
        with:
          targetPlatform: iOS
          allowDirtyBuild: true
          buildMethod: Framework.Editor.HybridCLRBuildSetup.InstallAndGenerateForBuilder

      - name: 生成 iOS Xcode 工程
        uses: game-ci/unity-builder@v4
        with:
          targetPlatform: iOS
          allowDirtyBuild: true

      - name: 上传 iOS Xcode 工程
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcode-project
          path: build/iOS
          if-no-files-found: error
