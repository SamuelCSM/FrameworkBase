name: FrameworkBase CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: frameworkbase-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
  UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
  UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

jobs:
  reproducibility:
    name: 干净副本可复现性预检
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 完整工作副本
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 校验关键工程输入均已纳入版本控制
        shell: pwsh
        run: ./Tools/ci/check-reproducibility.ps1

  tests:
    name: 编译与 EditMode/PlayMode 测试
    needs: reproducibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: test-library-${{ runner.os }}-${{ hashFiles('ProjectSettings/ProjectVersion.txt', 'Packages/manifest.json', 'Packages/packages-lock.json') }}
          restore-keys: |
            test-library-${{ runner.os }}-

      - name: 运行全部 Unity 测试
        uses: game-ci/unity-test-runner@v4
        with:
          testMode: all
          checkName: FrameworkBase Test Results
          artifactsPath: artifacts/test-results

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-results
          path: artifacts/test-results
          if-no-files-found: error

  asset-gate:
    name: 资源与工程质量门禁
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 执行 required 资源门禁
        uses: game-ci/unity-builder@v4
        with:
          targetPlatform: StandaloneLinux64
          buildMethod: Framework.Editor.CiGate.RunAssetGateForBuilder
          allowDirtyBuild: false
          customParameters: -strictFonts

  android-player:
    name: Android Player/IL2CPP 构建验证
    needs: asset-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 构建 Android Player
        uses: game-ci/unity-builder@v4
        with:
          targetPlatform: Android
          androidExportType: androidPackage
          allowDirtyBuild: false

      - name: 上传 Android 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: android-player
          path: build/Android
          if-no-files-found: error

  ios-xcode-project:
    name: iOS Xcode 工程生成验证
    needs: android-player
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 生成 iOS Xcode 工程
        uses: game-ci/unity-builder@v4
        with:
          targetPlatform: iOS
          allowDirtyBuild: false

      - name: 上传 iOS Xcode 工程
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcode-project
          path: build/iOS
          if-no-files-found: error
