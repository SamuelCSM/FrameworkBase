# FrameworkBase 质量门禁：编译 + EditMode 测试 + PlayMode 冒烟 + 资源门禁。
# 与 Tools/ci/run-ci.ps1 等价，push / PR 自动执行。
#
# 首次启用需要在仓库 Settings → Secrets and variables → Actions 配置 Unity 授权：
#   UNITY_LICENSE  个人版 .ulf 许可文件内容（获取方式见 Tools/ci/README.md）
#   UNITY_EMAIL    Unity 账号邮箱
#   UNITY_PASSWORD Unity 账号密码
name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  tests:
    name: 编译 + EditMode/PlayMode 测试
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json') }}
          restore-keys: |
            Library-

      # unityVersion 默认从 ProjectSettings/ProjectVersion.txt 读取（2022.3.62f3）。
      # 编译错误会导致本步骤失败，天然充当编译门禁。
      # testMode: all = EditMode + PlayMode 两条跑道（单 job 串行，避免个人版许可并发冲突）。
      - name: Run EditMode + PlayMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: all
          checkName: Test Results

      # 资源门禁：batchmode 执行 CiGate.RunAssetGate（Addressables 校验 + 字体缺字）。
      # 复用同一 Unity 许可；CiGate 落 ASCII 结论行 "[CiGate] GATE_RESULT exit=N"。
      # advisory（continue-on-error）：unity-builder 以进程退出码判定，而 batchmode 下即便
      # EditorApplication.Exit(0) 进程码仍可能非 0（本地跑道已证实），直接判定会误红卡 PR。
      # 强制门禁以本地 run-ci.ps1 为准（它按 GATE_RESULT 结论判定）；此步先做可见性，
      # 待日后换成「跑 editor + 解析 GATE_RESULT」的自定义步骤后再转强制。
      - name: 资源门禁（Addressables + 字体缺字，advisory）
        continue-on-error: true
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneLinux64
          buildMethod: Framework.Editor.CiGate.RunAssetGate
          allowDirtyBuild: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: artifacts
