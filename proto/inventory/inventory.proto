syntax = "proto3";
import "common/common.proto";          // 跨子文件夹引用
option csharp_namespace = "Game.Protocol";

// 拉取背包（主号 010）—— 演示 repeated CommonItem
message GC2GS_010_001_GetInventoryRequest {
  int64 UserId = 1;
}
message GS2GC_010_001_GetInventoryResponse {
  int32 ResultCode = 1;
  repeated CommonItem Items = 2;        // repeated 引用类型消息 —— IL2CPP 安全
}
